<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Etiquetas — Daltro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --dark:   #0F0F14;
    --dark2:  #1A1A24;
    --dark3:  #22222F;
    --border: #2E2E3E;
    --accent: #E94560;
    --text:   #F0F0F5;
    --muted:  #6B6B80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  .header {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
  .header-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .card-body { padding: 24px; }

  .section-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
  }

  .input-proc {
    width: 100%;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    margin-bottom: 20px;
  }
  .input-proc:focus { border-color: var(--accent); }
  .input-proc::placeholder { color: var(--muted); }

  .input-nome {
    width: 100%;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    margin-bottom: 20px;
  }
  .input-nome:focus { border-color: var(--accent); }
  .input-nome::placeholder { color: var(--muted); }

  .btn-gerar {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-gerar:hover { opacity: 0.85; }

  .preview-area { display: none; width: 100%; max-width: 560px; }
  .preview-area.show { display: block; }

  .btn-imprimir {
    width: 100%;
    max-width: 560px;
    padding: 14px;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 12px;
    transition: border-color 0.2s;
  }
  .btn-imprimir:hover { border-color: var(--accent); }

  .etiqueta-wrap {
    display: flex;
    justify-content: center;
    padding: 24px;
  }

  .etiqueta {
    width: 240px;
    border: 2px solid #CCCCCC;
    border-radius: 8px;
    overflow: hidden;
    background: white;
    font-family: Arial, sans-serif;
  }

  .etiqueta-header {
    background: #1A1A2E;
    padding: 10px 12px 8px;
    text-align: center;
  }
  .etiqueta-proc {
    color: white;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .etiqueta-empresa {
    color: #AAAAAA;
    font-size: 8px;
    margin-top: 2px;
  }

  .etiqueta-qr {
    display: flex;
    justify-content: center;
    padding: 12px 12px 6px;
    background: white;
  }
  /* A imagem gerada pelo QR */
  .etiqueta-qr img {
    width: 110px !important;
    height: 110px !important;
    display: block;
  }

  .etiqueta-divider {
    height: 1px;
    background: #EEEEEE;
    margin: 0 12px;
  }

  .etiqueta-nome {
    text-align: center;
    font-size: 9px;
    color: #1A1A2E;
    padding: 6px 8px 10px;
    background: white;
    word-break: break-word;
  }

  /* Área oculta para gerar o QR antes de converter */
  #qrHidden {
    position: absolute;
    left: -9999px;
    top: -9999px;
  }

  @media print {
    body { background: white; padding: 0; margin: 0; }
    .card, .btn-imprimir, .header { display: none !important; }
    .preview-area { display: block !important; }
    .etiqueta-wrap { padding: 8px; }
    .etiqueta {
      border: 1px solid #CCC;
      box-shadow: none;
      page-break-inside: avoid;
    }
    .etiqueta-header { background: #1A1A2E !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .etiqueta-qr img { width: 110px !important; height: 110px !important; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-dot"></div>
  <div class="header-title">Daltro Regularizações · Gerador de Etiquetas</div>
</div>

<div class="card">
  <div class="card-body">
    <div class="section-label">Código do processo</div>
    <input class="input-proc" id="inputProc" type="text" placeholder="Ex: PROC-126" maxlength="10"
      oninput="this.value = this.value.toUpperCase()">

    <div class="section-label">Nome do cliente</div>
    <input class="input-nome" id="inputNome" type="text" placeholder="Ex: João Silva de Oliveira">

    <button class="btn-gerar" onclick="gerarEtiqueta()">Gerar etiqueta</button>
  </div>
</div>

<!-- Área oculta para gerar QR e converter para imagem -->
<div id="qrHidden"></div>

<!-- PREVIEW -->
<div class="preview-area" id="previewArea">
  <div class="card">
    <div class="etiqueta-wrap">
      <div class="etiqueta">
        <div class="etiqueta-header">
          <div class="etiqueta-proc" id="labelProc">PROC-000</div>
          <div class="etiqueta-empresa">Daltro Regularizações</div>
        </div>
        <div class="etiqueta-qr" id="qrImgContainer"></div>
        <div class="etiqueta-divider"></div>
        <div class="etiqueta-nome" id="labelNome">—</div>
      </div>
    </div>
  </div>
  <button class="btn-imprimir" onclick="window.print()">🖨️ Imprimir etiqueta</button>
</div>

<script>
const BASE_URL = "https://daltroarquitetura7-tech.github.io/logistica/?proc=";

function gerarEtiqueta() {
  const proc = document.getElementById("inputProc").value.trim();
  const nome = document.getElementById("inputNome").value.trim();

  if (!proc) {
    alert("Digite o código do processo.");
    return;
  }

  const url = BASE_URL + encodeURIComponent(proc);

  // Atualiza labels
  document.getElementById("labelProc").textContent = proc;
  document.getElementById("labelNome").textContent = nome || "—";

  // Gera QR no container oculto
  const hidden = document.getElementById("qrHidden");
  hidden.innerHTML = "";

  new QRCode(hidden, {
    text: url,
    width: 200,
    height: 200,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });

  // Aguarda o canvas ser gerado e converte para <img>
  setTimeout(() => {
    const canvas = hidden.querySelector("canvas");
    if (canvas) {
      const imgSrc = canvas.toDataURL("image/png");
      const imgContainer = document.getElementById("qrImgContainer");
      imgContainer.innerHTML = `<img src="${imgSrc}" alt="QR Code">`;
    }

    // Mostra preview
    const preview = document.getElementById("previewArea");
    preview.classList.add("show");
    preview.scrollIntoView({ behavior: "smooth" });
  }, 300);
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") gerarEtiqueta();
});
</script>
</body>
</html>
